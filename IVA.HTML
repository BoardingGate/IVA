<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acumulador IVA: Modelo 303 a 390</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js para la reactividad de la interfaz -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- PDF.js de Mozilla para la lectura de documentos localmente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans" x-data="app()">

    <!-- Cabecera -->
    <header class="bg-blue-900 text-white shadow-md border-b border-blue-800">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-800 rounded-lg">
                    <svg class="w-8 h-8 text-blue-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Acumulador IVA España</h1>
                    <p class="text-xs text-blue-200">Asistente de consolidación Modelo 303 a 390</p>
                </div>
            </div>
            
            <!-- Acciones de backup -->
            <div class="flex flex-wrap gap-2">
                <button @click="exportData()" class="px-3 py-1.5 bg-blue-800 hover:bg-blue-700 rounded text-xs font-medium flex items-center gap-1.5 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Exportar Backup (Disco Duro)
                </button>
                <label class="px-3 py-1.5 bg-blue-800 hover:bg-blue-700 rounded text-xs font-medium flex items-center gap-1.5 cursor-pointer transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Importar Backup
                    <input type="file" accept=".json" class="hidden" @change="importData($event)">
                </label>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-7xl">
        
        <!-- Notificaciones de estado -->
        <div x-show="toast.show" x-transition class="fixed bottom-5 right-5 z-50 p-4 rounded-lg shadow-xl text-white flex items-center gap-2" :class="toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'">
            <span x-text="toast.message"></span>
            <button @click="toast.show = false" class="font-bold ml-2">&times;</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Columna Izquierda: Panel de Control y Carga -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- Sección de Carga de PDF -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-3">1. Subir Modelo 303 (PDF)</h2>
                    
                    <div class="border-2 border-dashed border-slate-300 rounded-lg p-6 hover:border-blue-500 transition cursor-pointer relative bg-slate-50 group">
                        <input type="file" accept=".pdf" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" @change="handlePdfUpload($event)">
                        <div class="text-center space-y-2 pointer-events-none">
                            <svg class="w-8 h-8 text-slate-400 group-hover:text-blue-500 mx-auto transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="text-xs font-semibold text-slate-600">Arrastra PDFs o haz clic aquí</p>
                            <p class="text-[10px] text-slate-400">Procesa uno o varios trimestres de forma totalmente local</p>
                        </div>
                    </div>

                    <!-- Progreso de carga/lectura -->
                    <div x-show="loading" class="mt-4 text-center">
                        <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
                        <p class="text-xs text-slate-500 mt-1">Extrayendo datos...</p>
                    </div>
                </div>

                <!-- Selección de Entidad -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                    <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider">2. Selección de Empresa</h2>
                    
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Empresa / NIF</label>
                        <select x-model="selectedCompany" class="w-full text-sm bg-slate-50 border border-slate-300 rounded p-2 focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="">-- Seleccionar Empresa --</option>
                            <template x-for="comp in Object.values(companies)" :key="comp.nif">
                                <option :value="comp.nif" x-text="`${comp.name} (${comp.nif})`"></option>
                            </template>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Año Fiscal</label>
                            <select x-model="selectedYear" class="w-full text-sm bg-slate-50 border border-slate-300 rounded p-2 focus:ring-1 focus:ring-blue-500 outline-none">
                                <option value="">-- Año --</option>
                                <template x-for="y in availableYears" :key="y">
                                    <option :value="y" x-text="y"></option>
                                </template>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button @click="addNewCompanyPrompt()" class="w-full text-center px-2 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded text-xs font-semibold transition">
                                + Crear Empresa
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Tablas de Trabajo -->
            <div class="lg:col-span-3 space-y-6">
                
                <!-- Si no hay selección, mostramos pantalla vacía explicativa -->
                <template x-if="!selectedCompany || !selectedYear">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center space-y-3">
                        <svg class="w-16 h-16 text-slate-300 mx-auto" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                        <h3 class="text-lg font-bold text-slate-700">Comienza a consolidar datos</h3>
                        <p class="text-slate-500 text-sm max-w-md mx-auto">Sube uno o varios archivos PDF del Modelo 303. El sistema creará automáticamente la empresa y ordenará los datos fiscales de forma inmediata, o bien crea una empresa manualmente para empezar a teclear.</p>
                    </div>
                </template>

                <!-- Área de trabajo activa -->
                <template x-if="selectedCompany && selectedYear">
                    <div class="space-y-6">
                        
                        <!-- Datos Identificativos de la Empresa activa -->
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full uppercase tracking-wider">Empresa Activa</span>
                                <h3 class="text-lg font-bold text-slate-800 mt-1" x-text="companies[selectedCompany]?.name || 'Sin Nombre'"></h3>
                                <p class="text-xs text-slate-500">NIF: <span class="font-mono text-slate-700 font-semibold" x-text="selectedCompany"></span> | Año Fiscal de Consolidación: <span class="font-semibold text-slate-700" x-text="selectedYear"></span></p>
                            </div>
                            <div class="flex gap-2">
                                <button @click="deleteActiveYearData()" class="px-3 py-1.5 text-xs text-red-600 hover:bg-red-50 border border-red-200 rounded transition font-medium">
                                    Borrar este año
                                </button>
                            </div>
                        </div>

                        <!-- Selector de Vista (303 por Trimestre vs Resumen 390) -->
                        <div class="flex border-b border-slate-200">
                            <button @click="currentTab = '303'" :class="currentTab === '303' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-slate-500 hover:text-slate-700'" class="py-2.5 px-4 text-sm border-b-2 font-medium transition whitespace-nowrap">
                                Entrada Trimestral (Mod 303)
                            </button>
                            <button @click="currentTab = '390'" :class="currentTab === '390' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-slate-500 hover:text-slate-700'" class="py-2.5 px-4 text-sm border-b-2 font-medium transition whitespace-nowrap">
                                Resumen Anual Consolidado (Mod 390)
                            </button>
                        </div>

                        <!-- TAB 1: DATOS TRIMESTRALES 303 -->
                        <div x-show="currentTab === '303'" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold text-slate-700 text-sm">Declaraciones Recibidas (Modelos 303)</h4>
                                    <p class="text-xs text-slate-500">Los datos que edites aquí se recalculan de forma inmediata en el acumulado.</p>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600 uppercase tracking-wider">
                                            <th class="p-3 font-semibold min-w-[200px]">Casilla / Concepto Modelo 303</th>
                                            <th class="p-3 text-right font-semibold w-28">1T</th>
                                            <th class="p-3 text-right font-semibold w-28">2T</th>
                                            <th class="p-3 text-right font-semibold w-28">3T</th>
                                            <th class="p-3 text-right font-semibold w-28">4T</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 text-xs">
                                        <template x-for="item in mappedBoxes303" :key="item.box303">
                                            <tr class="hover:bg-slate-50 transition">
                                                <td class="p-3">
                                                    <span class="font-mono bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded mr-2 font-bold" x-text="'['+item.box303+']'"></span>
                                                    <span class="text-slate-600 font-medium" x-text="item.label"></span>
                                                </td>
                                                <template x-for="period in ['1T', '2T', '3T', '4T']" :key="period">
                                                    <td class="p-2 text-right">
                                                        <input type="number" step="0.01" 
                                                               :value="getBox303Value(selectedCompany, selectedYear, period, item.box303)"
                                                               @input="updateBox303Value(selectedCompany, selectedYear, period, item.box303, $event.target.value)"
                                                               class="w-full text-right p-1.5 border border-slate-200 rounded hover:border-slate-300 focus:border-blue-500 outline-none font-mono text-xs focus:bg-white bg-slate-50/50">
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- TAB 2: RESUMEN ANUAL 390 (CON DOBLE CAMPO / AJUSTE MANUAL) -->
                        <div x-show="currentTab === '390'" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="p-4 bg-slate-50 border-b border-slate-200">
                                <h4 class="font-bold text-slate-700 text-sm">Resumen Acumulado y Preparación del Modelo 390</h4>
                                <p class="text-xs text-slate-500">Usa la columna de "Ajuste / Valor Libre" para corregir discrepancias o redondeos sin alterar los sumatorios reales.</p>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600 uppercase tracking-wider">
                                            <th class="p-3 font-semibold min-w-[220px]">Casilla / Concepto Modelo 390</th>
                                            <th class="p-3 text-right font-semibold w-36">Suma Automática (303)</th>
                                            <th class="p-3 text-center font-semibold w-12"></th>
                                            <th class="p-3 text-right font-semibold w-40">Valor Libre / Ajustado</th>
                                            <th class="p-3 text-right font-semibold w-36 bg-blue-50/50 text-blue-900">Resultado Final</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 text-xs">
                                        <template x-for="item in mapping390" :key="item.box390">
                                            <tr class="hover:bg-slate-50 transition" :class="hasOverride(selectedCompany, selectedYear, item.box390) ? 'bg-amber-50/30' : ''">
                                                <td class="p-3">
                                                    <span class="font-mono bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded mr-2 font-bold" x-text="'['+item.box390+']'"></span>
                                                    <span class="text-slate-700 font-semibold" x-text="item.label"></span>
                                                    <div class="text-[10px] text-slate-400 mt-0.5" x-text="'Suma de casillas 303: ' + item.sources.map(b => `[${b}]`).join(' + ')"></div>
                                                </td>
                                                <td class="p-3 text-right font-mono text-slate-500" x-text="formatCurrency(calculateSum390(selectedCompany, selectedYear, item))"></td>
                                                <td class="p-3 text-center">
                                                    <!-- Icono indicador de estado de sobrescritura -->
                                                    <span x-show="hasOverride(selectedCompany, selectedYear, item.box390)" title="Se está usando un valor manual" class="inline-block text-amber-500">
                                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1zM4 4h3a1 1 0 010 2H4a1 1 0 110-2zm10 0h3a1 1 0 110 2h-3a1 1 0 110-2zM2 9a1 1 0 011-1h1a1 1 0 010 2H3a1 1 0 01-1-1zm13 0a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1zM2 14a1 1 0 011-1h3a1 1 0 110 2H3a1 1 0 01-1-1zm10 0a1 1 0 011-1h3a1 1 0 110 2h-3a1 1 0 01-1-1zM4 18a1 1 0 011-1h1a1 1 0 010 2H5a1 1 0 01-1-1zm10 0a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1z"></path></svg>
                                                    </span>
                                                </td>
                                                <td class="p-2 text-right">
                                                    <div class="relative flex items-center">
                                                        <input type="number" step="0.01" placeholder="Ej: 150.50"
                                                               :value="getOverrideValue(selectedCompany, selectedYear, item.box390)"
                                                               @input="updateOverrideValue(selectedCompany, selectedYear, item.box390, $event.target.value)"
                                                               class="w-full text-right p-1.5 border border-slate-200 rounded focus:border-amber-500 outline-none font-mono text-xs bg-amber-50/10 hover:bg-amber-50/20 focus:bg-white placeholder:text-slate-300">
                                                        <button x-show="hasOverride(selectedCompany, selectedYear, item.box390)" 
                                                                @click="updateOverrideValue(selectedCompany, selectedYear, item.box390, '')"
                                                                class="absolute left-1 text-slate-400 hover:text-red-500 font-bold" title="Eliminar ajuste manual">
                                                            &times;
                                                        </button>
                                                    </div>
                                                </td>
                                                <td class="p-3 text-right font-mono font-bold text-slate-800 bg-blue-50/30 border-l border-slate-100" 
                                                    :class="hasOverride(selectedCompany, selectedYear, item.box390) ? 'text-amber-700 bg-amber-50/20' : 'text-blue-900 bg-blue-50/40'"
                                                    x-text="formatCurrency(getFinal390Value(selectedCompany, selectedYear, item))">
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </template>

            </div>

        </div>

    </main>

    <!-- Script de lógica de la aplicación -->
    <script>
        // Configuración inicial de PDF.js de Mozilla
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        function app() {
            return {
                // Estados principales
                loading: false,
                companies: {}, // { nif: { nif, name } }
                records: {},   // { companyNif_year_period: { "01": 100, "03": 4 } }
                overrides: {}, // { companyNif_year_box390: 120 }
                
                // Filtros y control de vistas
                selectedCompany: '',
                selectedYear: '',
                availableYears: ['2023', '2024', '2025'],
                currentTab: '303',
                
                // Avisador visual (Toast)
                toast: {
                    show: false,
                    message: '',
                    type: 'success'
                },

                // Base de datos local (IndexedDB)
                db: null,

                // Catálogo de casillas críticas del modelo 303 que necesitamos
                mappedBoxes303: [
                    { box303: '01', label: 'Régimen general - Base imponible al 4%' },
                    { box303: '03', label: 'Régimen general - Cuota al 4%' },
                    { box303: '04', label: 'Régimen general - Base imponible al 10%' },
                    { box303: '06', label: 'Régimen general - Cuota al 10%' },
                    { box303: '07', label: 'Régimen general - Base imponible al 21%' },
                    { box303: '09', label: 'Régimen general - Cuota al 21%' },
                    { box303: '27', label: 'Total Cuota Devengada' },
                    { box303: '28', label: 'Op. Interiores Corrientes - Base' },
                    { box303: '29', label: 'Op. Interiores Corrientes - Cuota' },
                    { box303: '30', label: 'Op. Interiores Bienes Inversión - Base' },
                    { box303: '31', label: 'Op. Interiores Bienes Inversión - Cuota' },
                    { box303: '45', label: 'Total IVA Deducible' },
                    { box303: '46', label: 'Resultado de la Liquidación' }
                ],

                // Mapeo estructurado para construir el Modelo 390 partiendo de los Modelo 303 consolidados
                mapping390: [
                    { box390: '01', label: 'Base Imponible al 4%', sources: ['01'] },
                    { box390: '02', label: 'Cuota Devengada al 4%', sources: ['03'] },
                    { box390: '03', label: 'Base Imponible al 10%', sources: ['04'] },
                    { box390: '04', label: 'Cuota Devengada al 10%', sources: ['06'] },
                    { box390: '05', label: 'Base Imponible al 21%', sources: ['07'] },
                    { box390: '06', label: 'Cuota Devengada al 21%', sources: ['09'] },
                    { box390: '64', label: 'Total IVA Devengado Acumulado', sources: ['27'] },
                    { box390: '190', label: 'Op. Interiores Corrientes - Base Deducible', sources: ['28'] },
                    { box390: '191', label: 'Op. Interiores Corrientes - Cuota Deducible', sources: ['29'] },
                    { box390: '192', label: 'Op. Interiores Bienes Inversión - Base Deducible', sources: ['30'] },
                    { box390: '193', label: 'Op. Interiores Bienes Inversión - Cuota Deducible', sources: ['31'] },
                    { box390: '232', label: 'Total IVA Deducible Acumulado', sources: ['45'] },
                    { box390: '658', label: 'Resultado de Liquidaciones Final', sources: ['46'] }
                ],

                // Inicializar la App y abrir conexión con IndexedDB
                async init() {
                    this.initIndexedDB();
                },

                showToast(message, type = 'success') {
                    this.toast.message = message;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3500);
                },

                // Conexión local permanente a la Base de Datos del Navegador
                initIndexedDB() {
                    const request = indexedDB.open("iva_acumulador_db", 1);
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains("companies")) db.createObjectStore("companies", { keyPath: "nif" });
                        if (!db.objectStoreNames.contains("records")) db.createObjectStore("records");
                        if (!db.objectStoreNames.contains("overrides")) db.createObjectStore("overrides");
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        this.loadDataFromDB();
                    };

                    request.onerror = () => {
                        this.showToast("No se pudo iniciar la base de datos local en el navegador.", "error");
                    };
                },

                // Cargar datos en memoria desde la base de datos IndexedDB
                loadDataFromDB() {
                    const transaction = this.db.transaction(["companies", "records", "overrides"], "readonly");
                    
                    // Cargar Empresas
                    transaction.objectStore("companies").getAll().onsuccess = (e) => {
                        const list = e.target.result;
                        list.forEach(c => { this.companies[c.nif] = c; });
                    };

                    // Cargar Registros Trimestrales
                    const recordsStore = transaction.objectStore("records");
                    const recordsReq = recordsStore.openCursor();
                    recordsReq.onsuccess = (e) => {
                        const cursor = e.target.result;
                        if (cursor) {
                            this.records[cursor.key] = cursor.value;
                            cursor.continue();
                        }
                    };

                    // Cargar Ajustes Manuales
                    const overridesStore = transaction.objectStore("overrides");
                    const overridesReq = overridesStore.openCursor();
                    overridesReq.onsuccess = (e) => {
                        const cursor = e.target.result;
                        if (cursor) {
                            this.overrides[cursor.key] = cursor.value;
                            cursor.continue();
                        }
                    };
                },

                // Guardar persistencia de forma aislada
                saveLocal(storeName, key, value) {
                    if (!this.db) return;
                    const transaction = this.db.transaction([storeName], "readwrite");
                    const store = transaction.objectStore(storeName);
                    
                    if (value === undefined || value === null || value === '') {
                        store.delete(key);
                    } else {
                        // Si se guarda en companies, el valor debe incluir la clave principal
                        store.put(value, storeName === 'companies' ? undefined : key);
                    }
                },

                // Crear Empresa Manual
                addNewCompanyPrompt() {
                    const name = prompt("Escribe el nombre de la empresa:");
                    if (!name) return;
                    const nif = prompt("Escribe el NIF de la empresa:").trim().toUpperCase();
                    if (!nif) return;

                    if (this.companies[nif]) {
                        this.showToast("Esta empresa ya existe", "error");
                        return;
                    }

                    const newComp = { nif, name };
                    this.companies[nif] = newComp;
                    this.saveLocal("companies", nif, newComp);
                    
                    this.selectedCompany = nif;
                    this.selectedYear = new Date().getFullYear().toString();
                    this.showToast("Empresa creada correctamente");
                },

                // Lógica de lectura y descodificación de PDFs
                async handlePdfUpload(event) {
                    const files = event.target.files;
                    if (!files.length) return;

                    this.loading = true;
                    let correctCount = 0;

                    for (let i = 0; i < files.length; i++) {
                        try {
                            const file = files[i];
                            const arrayBuffer = await file.arrayBuffer();
                            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                            let fullText = "";

                            // Unir texto de todas las páginas del documento
                            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                                const page = await pdf.getPage(pageNum);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(" ");
                                fullText += " " + pageText;
                            }

                            const parseResult = this.parseTaxPdfText(fullText);
                            if (parseResult) {
                                this.saveParsedResult(parseResult);
                                correctCount++;
                            } else {
                                this.showToast(`No se pudo identificar un Modelo 303 válido en: ${file.name}`, "error");
                            }

                        } catch (err) {
                            console.error(err);
                            this.showToast("Error procesando uno de los archivos PDF.", "error");
                        }
                    }

                    this.loading = false;
                    if (correctCount > 0) {
                        this.showToast(`Procesados ${correctCount} documentos correctamente.`);
                    }
                },

                // Extractor inteligente heurístico basado en expresiones regulares
                parseTaxPdfText(text) {
                    // Validar si realmente es un Modelo 303
                    if (!text.includes("303") && !text.includes("Liquidación mensual/trimestral")) {
                        return null;
                    }

                    // Intentar identificar NIF español (Letra seguida de 8 dígitos o 8 dígitos seguidos de letra)
                    const nifMatch = text.match(/\b([A-HJ-NP-S-W]\d{7}[A-Z]|\d{8}[A-Z])\b/i);
                    const nif = nifMatch ? nifMatch[1].toUpperCase() : 'NIF_DESCONOCIDO';

                    // Intentar identificar Razón Social (asociada después de marcas de la AEAT)
                    let name = "Empresa Autocreada";
                    const nameRegex = /(?:Apellidos y nombre o Razón social:?|Sujeto pasivo)\s+([^0-9\n]{10,60})/i;
                    const nameMatch = text.match(nameRegex);
                    if (nameMatch && nameMatch[1]) {
                        name = nameMatch[1].trim();
                    }

                    // Identificar Ejercicio Fiscal (Año)
                    const yearMatch = text.match(/\b(20\d{2})\b/);
                    const year = yearMatch ? yearMatch[1] : new Date().getFullYear().toString();

                    // Identificar Periodo Trimestral (1T, 2T, 3T, 4T o sus variantes como 1-T o 01, 02...)
                    let period = '1T';
                    const periodMatch = text.match(/\b(1T|2T|3T|4T|1-T|2-T|3-T|4-T)\b/i);
                    if (periodMatch) {
                        period = periodMatch[1].toUpperCase().replace('-', '');
                    } else {
                        // Fallback de meses a trimestres si es una declaración mensual
                        const monthMatch = text.match(/\b(01|02|03|04|05|06|07|08|09|10|11|12)\b/);
                        if (monthMatch) {
                            const m = parseInt(monthMatch[1], 10);
                            if (m <= 3) period = '1T';
                            else if (m <= 6) period = '2T';
                            else if (m <= 9) period = '3T';
                            else period = '4T';
                        }
                    }

                    // Mapeo dinámico de casillas
                    const values = {};
                    this.mappedBoxes303.forEach(item => {
                        // Buscamos un formato común en PDF: "[Nº Casilla]" o "Casilla Nº" seguido del número decimal
                        // O patrones como "03" seguido de espacio y el valor monetario
                        const patterns = [
                            new RegExp(`\\[${item.box303}\\]\\s*(-?\\d+[.,]\\d{2})`, 'i'),
                            new RegExp(`\\b${item.box303}\\s+([\\d.,]+)`, 'i'),
                            new RegExp(`\\b${item.box303}\\b[^\\d]*?([\\d.,]+)`, 'i')
                        ];

                        let matchedValue = 0;
                        for (let regex of patterns) {
                            const match = text.match(regex);
                            if (match && match[1]) {
                                // Limpieza del formato numérico español (1.000,50 -> 1000.50)
                                let cleaned = match[1].replace(/\./g, '').replace(',', '.');
                                matchedValue = parseFloat(cleaned) || 0;
                                break;
                            }
                        }
                        values[item.box303] = matchedValue;
                    });

                    return { nif, name, year, period, values };
                },

                // Salvar resultados detectados por el sistema
                saveParsedResult(data) {
                    // Si la empresa no existe, la añadimos sobre la marcha
                    if (!this.companies[data.nif]) {
                        const newC = { nif: data.nif, name: data.name };
                        this.companies[data.nif] = newC;
                        this.saveLocal("companies", data.nif, newC);
                    }

                    // Almacenar el registro del trimestre
                    const recordKey = `${data.nif}_${data.year}_${data.period}`;
                    this.records[recordKey] = data.values;
                    this.saveLocal("records", recordKey, data.values);

                    // Auto-seleccionar para que el usuario visualice el cambio
                    this.selectedCompany = data.nif;
                    this.selectedYear = data.year;
                },

                // Lectores de valores trimestrales de las casillas del 303
                getBox303Value(nif, year, period, box) {
                    const key = `${nif}_${year}_${period}`;
                    if (this.records[key] && this.records[key][box] !== undefined) {
                        return this.records[key][box];
                    }
                    return 0;
                },

                // Permitir edición directa por teclado de las casillas importadas
                updateBox303Value(nif, year, period, box, val) {
                    const key = `${nif}_${year}_${period}`;
                    if (!this.records[key]) {
                        this.records[key] = {};
                    }
                    this.records[key][box] = parseFloat(val) || 0;
                    this.saveLocal("records", key, this.records[key]);
                },

                // Lógica de cálculo acumulador del Modelo 390
                calculateSum390(nif, year, item) {
                    let total = 0;
                    const periods = ['1T', '2T', '3T', '4T'];
                    
                    periods.forEach(period => {
                        const key = `${nif}_${year}_${period}`;
                        if (this.records[key]) {
                            item.sources.forEach(box303 => {
                                if (this.records[key][box303]) {
                                    total += parseFloat(this.records[key][box303]) || 0;
                                }
                            });
                        }
                    });

                    return Math.round(total * 100) / 100;
                },

                // Lectores y actualizadores de la sobrescritura manual
                getOverrideValue(nif, year, box390) {
                    const key = `${nif}_${year}_${box390}`;
                    return this.overrides[key] !== undefined ? this.overrides[key] : '';
                },

                hasOverride(nif, year, box390) {
                    const key = `${nif}_${year}_${box390}`;
                    return this.overrides[key] !== undefined && this.overrides[key] !== '';
                },

                updateOverrideValue(nif, year, box390, val) {
                    const key = `${nif}_${year}_${box390}`;
                    if (val === '') {
                        delete this.overrides[key];
                        this.saveLocal("overrides", key, null);
                    } else {
                        const num = parseFloat(val) || 0;
                        this.overrides[key] = num;
                        this.saveLocal("overrides", key, num);
                    }
                },

                // Devuelve el dato final aplicando la prioridad: Valor Libre > Suma Automática
                getFinal390Value(nif, year, item) {
                    if (this.hasOverride(nif, year, item.box390)) {
                        return this.overrides[`${nif}_${year}_${item.box390}`];
                    }
                    return this.calculateSum390(nif, year, item);
                },

                // Formateador estándar de divisa
                formatCurrency(value) {
                    return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(value || 0);
                },

                // Borrar datos del año actual
                deleteActiveYearData() {
                    if (confirm(`¿Seguro que deseas vaciar todos los registros del año fiscal ${this.selectedYear}?`)) {
                        const periods = ['1T', '2T', '3T', '4T'];
                        periods.forEach(p => {
                            const key = `${this.selectedCompany}_${this.selectedYear}_${p}`;
                            delete this.records[key];
                            this.saveLocal("records", key, null);
                        });

                        this.mapping390.forEach(item => {
                            const key = `${this.selectedCompany}_${this.selectedYear}_${item.box390}`;
                            delete this.overrides[key];
                            this.saveLocal("overrides", key, null);
                        });

                        this.showToast("Datos borrados localmente.");
                    }
                },

                // Exportación al disco duro local (Resguardo total en formato JSON)
                exportData() {
                    const dataPayload = {
                        companies: this.companies,
                        records: this.records,
                        overrides: this.overrides
                    };

                    const blob = new Blob([JSON.stringify(dataPayload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Copia_Seguridad_IVA_${new Date().toISOString().slice(0,10)}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    this.showToast("Copia de seguridad descargada correctamente.");
                },

                // Importar copia de seguridad desde el disco duro
                importData(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const parsed = JSON.parse(e.target.result);
                            
                            if (parsed.companies && parsed.records && parsed.overrides) {
                                // Fusionar datos importados
                                Object.assign(this.companies, parsed.companies);
                                Object.assign(this.records, parsed.records);
                                Object.assign(this.overrides, parsed.overrides);

                                // Escribir de golpe en IndexedDB
                                const transaction = this.db.transaction(["companies", "records", "overrides"], "readwrite");
                                
                                Object.keys(parsed.companies).forEach(k => transaction.objectStore("companies").put(parsed.companies[k]));
                                Object.keys(parsed.records).forEach(k => transaction.objectStore("records").put(parsed.records[k], k));
                                Object.keys(parsed.overrides).forEach(k => transaction.objectStore("overrides").put(parsed.overrides[k], k));

                                this.showToast("Copia de seguridad restaurada correctamente.");
                                if (Object.keys(this.companies).length > 0) {
                                    this.selectedCompany = Object.keys(this.companies)[0];
                                    this.selectedYear = new Date().getFullYear().toString();
                                }
                            } else {
                                this.showToast("El archivo JSON no contiene el formato esperado.", "error");
                            }
                        } catch (err) {
                            this.showToast("No se pudo leer el archivo de copia de seguridad.", "error");
                        }
                    };
                    reader.readAsText(file);
                }
            };
        }
    </script>
