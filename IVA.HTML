<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acumulador IVA: Modelo 303 a 390</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js para la reactividad de la interfaz -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- PDF.js de Mozilla v2 (Estable y de alta compatibilidad) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans" x-data="app()">

    <!-- Cabecera -->
    <header class="bg-blue-900 text-white shadow-md border-b border-blue-800">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-800 rounded-lg">
                    <svg class="w-8 h-8 text-blue-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Acumulador IVA España</h1>
                    <p class="text-xs text-blue-200">Consolidador con maquetación idéntica a la AEAT y descarte de años</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button @click="exportData()" class="px-3 py-1.5 bg-blue-800 hover:bg-blue-700 rounded text-xs font-medium flex items-center gap-1.5 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Exportar Copia de Seguridad
                </button>
                <label class="px-3 py-1.5 bg-blue-800 hover:bg-blue-700 rounded text-xs font-medium flex items-center gap-1.5 cursor-pointer transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Importar Copia
                    <input type="file" accept=".json" class="hidden" @change="importData($event)">
                </label>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-7xl">
        
        <!-- Alertas de estado -->
        <div x-show="toast.show" x-transition class="fixed bottom-5 right-5 z-50 p-4 rounded-lg shadow-xl text-white flex items-center gap-2" :class="toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'">
            <span x-text="toast.message"></span>
            <button @click="toast.show = false" class="font-bold ml-2">&times;</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Columna Izquierda: Panel de Control -->
            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-3">1. Subir Modelo 303 (PDF)</h2>
                    <div class="border-2 border-dashed border-slate-300 rounded-lg p-6 hover:border-blue-500 transition cursor-pointer relative bg-slate-50 group">
                        <input type="file" accept=".pdf" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" @change="handlePdfUpload($event)">
                        <div class="text-center space-y-2 pointer-events-none">
                            <svg class="w-8 h-8 text-slate-400 group-hover:text-blue-500 mx-auto transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="text-xs font-semibold text-slate-600">Suelte aquí sus PDFs</p>
                            <p class="text-[10px] text-slate-400">Extractor con filtro anti-falsos positivos en decimales</p>
                        </div>
                    </div>

                    <div x-show="loading" class="mt-4 text-center">
                        <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
                        <p class="text-xs text-slate-500 mt-1" x-text="loadingStatus"></p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-4">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider">2. Filtro de Trabajo</h2>
                    
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Empresa / NIF</label>
                        <select x-model="selectedCompany" class="w-full text-sm bg-slate-50 border border-slate-300 rounded p-2 focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="">-- Seleccionar Empresa --</option>
                            <template x-for="comp in Object.values(companies)" :key="comp.nif">
                                <option :value="comp.nif" x-text="`${comp.name} (${comp.nif})`"></option>
                            </template>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Año Fiscal</label>
                            <select x-model="selectedYear" class="w-full text-sm bg-slate-50 border border-slate-300 rounded p-2 focus:ring-1 focus:ring-blue-500 outline-none">
                                <option value="">-- Año --</option>
                                <template x-for="y in availableYears" :key="y">
                                    <option :value="y" x-text="y"></option>
                                </template>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button @click="addNewCompanyPrompt()" class="w-full text-center px-2 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded text-xs font-semibold transition">
                                + Crear Manual
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4" x-show="rawTextPreview">
                    <button @click="showDebug = !showDebug" class="text-xs font-bold text-slate-500 hover:text-slate-800 flex justify-between w-full">
                        <span>Lector de texto</span>
                        <span x-text="showDebug ? '[-] Ocultar' : '[+] Depurar'"></span>
                    </button>
                    <div x-show="showDebug" class="mt-2">
                        <textarea class="w-full h-40 text-[9px] font-mono p-2 bg-slate-100 border rounded" readonly x-text="rawTextPreview"></textarea>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Panel Principal -->
            <div class="lg:col-span-3 space-y-6">
                
                <template x-if="!selectedCompany || !selectedYear">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center space-y-3">
                        <svg class="w-16 h-16 text-slate-300 mx-auto" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                        <h3 class="text-lg font-bold text-slate-700">Por favor, selecciona o importa una declaración</h3>
                        <p class="text-slate-500 text-sm max-w-md mx-auto">Sube tus autoliquidaciones oficiales de la AEAT en PDF. El lector filtrará de forma inteligente las celdas vacías y tipos impositivos para cuadrar todos los datos.</p>
                    </div>
                </template>

                <template x-if="selectedCompany && selectedYear">
                    <div class="space-y-6">
                        
                        <!-- Información activa -->
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full uppercase tracking-wider">Declaración Activa</span>
                                <h3 class="text-lg font-bold text-slate-800 mt-1" x-text="companies[selectedCompany]?.name"></h3>
                                <p class="text-xs text-slate-500">NIF: <span class="font-mono text-slate-700 font-semibold" x-text="selectedCompany"></span> | Ejercicio: <span class="font-semibold text-slate-700" x-text="selectedYear"></span></p>
                            </div>
                            <button @click="deleteActiveYearData()" class="px-3 py-1.5 text-xs text-red-600 hover:bg-red-50 border border-red-200 rounded transition font-medium">
                                Eliminar ejercicio
                            </button>
                        </div>

                        <!-- Pestañas Principales -->
                        <div class="flex border-b border-slate-200">
                            <button @click="currentTab = '303'" :class="currentTab === '303' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-slate-500 hover:text-slate-700'" class="py-2.5 px-4 text-sm border-b-2 font-medium transition">
                                Entrada de Datos (Modelo 303 Oficial)
                            </button>
                            <button @click="currentTab = '390'" :class="currentTab === '390' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-slate-500 hover:text-slate-700'" class="py-2.5 px-4 text-sm border-b-2 font-medium transition">
                                Acumulados para Modelo 390
                            </button>
                        </div>

                        <!-- TABLA MAQUETADA TRIMESTRE A TRIMESTRE IDÉNTICA AL MODELO OFICIAL -->
                        <div x-show="currentTab === '303'" class="space-y-6">
                            
                            <!-- Sub-Selector de Trimestre Activo -->
                            <div class="bg-slate-200/60 p-2 rounded-lg flex gap-1 justify-center sm:justify-start">
                                <template x-for="p in ['1T', '2T', '3T', '4T']" :key="p">
                                    <button @click="activeQuarter = p" 
                                            :class="activeQuarter === p ? 'bg-blue-800 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-300'"
                                            class="px-5 py-2 rounded text-xs font-semibold transition" x-text="'Visualizar: ' + p">
                                    </button>
                                </template>
                            </div>

                            <div class="space-y-6">
                                <!-- BLOQUE A: IVA DEVENGADO (RÉPLICA OFICIAL) -->
                                <div class="bg-white rounded-xl shadow-sm border border-blue-200 overflow-hidden">
                                    <div class="p-3 bg-blue-800 text-white flex justify-between items-center">
                                        <h4 class="font-bold text-xs uppercase tracking-wider" x-text="`I. IVA DEVENGADO - Trimestre ${activeQuarter}`"></h4>
                                        <span class="text-[10px] bg-blue-700 text-blue-100 px-2 py-0.5 rounded font-mono">REPERCUTIDO</span>
                                    </div>
                                    <div class="p-4 space-y-4">
                                        <div class="grid grid-cols-12 gap-3 text-center font-bold text-xs text-slate-500 pb-2 border-b border-slate-100">
                                            <div class="col-span-5 text-left">Concepto de Liquidación</div>
                                            <div class="col-span-3">Base Imponible</div>
                                            <div class="col-span-1">Tipo %</div>
                                            <div class="col-span-3">Cuota Resultante</div>
                                        </div>

                                        <!-- Régimen General 4% -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs">
                                            <div class="col-span-5 font-medium">Régimen General al 4%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[01]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '01')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '01', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center font-bold text-slate-400">4%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[03]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '03')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '03', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Régimen General 10% -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-2 border-t border-slate-50">
                                            <div class="col-span-5 font-medium">Régimen General al 10%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[04]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '04')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '04', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center font-bold text-slate-400">10%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[06]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '06')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '06', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Régimen General 21% -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-2 border-t border-slate-50">
                                            <div class="col-span-5 font-medium">Régimen General al 21%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[07]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '07')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '07', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center font-bold text-slate-400">21%</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[09]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '09')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '09', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Adquisiciones Intracomunitarias -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-2 border-t border-slate-50">
                                            <div class="col-span-5 font-medium">Adquisiciones Intracomunitarias</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[10]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '10')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '10', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center text-slate-400">-</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[11]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '11')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '11', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Inversión del Sujeto Pasivo -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-2 border-t border-slate-50">
                                            <div class="col-span-5 font-medium">Inversión del Sujeto Pasivo</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[12]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '12')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '12', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center text-slate-400">-</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[13]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '13')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '13', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Modificación de Bases y Cuotas -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-2 border-t border-slate-50">
                                            <div class="col-span-5 font-medium">Modificación de Bases y Cuotas</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[14]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '14')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '14', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                            <div class="col-span-1 text-center text-slate-400">-</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[15]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '15')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '15', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-blue-500 outline-none">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Total Devengado Casilla 27 -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs pt-3 border-t border-slate-200 bg-slate-100 p-2 rounded">
                                            <div class="col-span-9 font-bold text-slate-700 uppercase">Total Cuota IVA Devengado</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-blue-100 text-blue-800 px-1 py-0.5 rounded text-[10px] font-bold">[27]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '27')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '27', $event.target.value)" class="w-full text-right p-1.5 border border-slate-300 rounded font-mono bg-white font-bold text-blue-900 text-xs">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- BLOQUE B: IVA DEDUCIBLE (RÉPLICA OFICIAL) -->
                                <div class="bg-white rounded-xl shadow-sm border border-emerald-200 overflow-hidden">
                                    <div class="p-3 bg-emerald-800 text-white flex justify-between items-center">
                                        <h4 class="font-bold text-xs uppercase tracking-wider" x-text="`II. IVA DEDUCIBLE - Trimestre ${activeQuarter}`"></h4>
                                        <span class="text-[10px] bg-emerald-700 text-emerald-100 px-2 py-0.5 rounded font-mono">SOPORTADO</span>
                                    </div>
                                    <div class="p-4 space-y-4">
                                        <div class="grid grid-cols-12 gap-3 text-center font-bold text-xs text-slate-500 pb-2 border-b border-slate-100">
                                            <div class="col-span-5 text-left">Concepto de Liquidación</div>
                                            <div class="col-span-3">Base Imponible</div>
                                            <div class="col-span-1 text-slate-400">-</div>
                                            <div class="col-span-3">Cuota Deducible</div>
                                        </div>

                                        <!-- Corrientes Interiores -->
                                        <div class="grid grid-cols-12 gap-3 items-center text-xs">
                                            <div class="col-span-5 font-medium">Operaciones Corrientes Interiores</div>
                                            <div class="col-span-3">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] font-bold text-slate-500">[28]</span>
                                                    <input type="text" :value="getBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '28')" @blur="updateBox303ValueFormatted(selectedCompany, selectedYear, activeQuarter, '28', $event.target.value)" class="w-full text-right p-1.5 border border-slate-200 rounded font-mono text-xs focus:border-emerald-500 outline-none">

            },
            { 
                label: 'Cuotas a compensar acumuladas', 
                description: 'Suma de la casilla [110] de los 4 trimestres',
                baseItem: null, 
                cuotaItem: { box390: '84', sources: ['110'] } 
            },
            { 
                label: 'Resultado de Liquidaciones Final', 
                description: 'Suma de la casilla de resultado de liquidación [46]',
                baseItem: null, 
                cuotaItem: { box390: '658', sources: ['46'] } 
            }
        ];

        // INICIALIZACIÓN DEL HILO EN SEGUNDO PLANO DE MOZILLA
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        function app() {
            return {
                loading: false,
                loadingStatus: '',
                showDebug: false,
                rawTextPreview: '',
                
                companies: JSON.parse(localStorage.getItem('iva_companies')) || {},
                records: JSON.parse(localStorage.getItem('iva_records')) || {},
                overrides: JSON.parse(localStorage.getItem('iva_overrides')) || {},
                
                selectedCompany: '',
                selectedYear: '',
                availableYears: ['2023', '2024', '2025'],
                currentTab: '303',
                activeQuarter: '1T',
                
                toast: {
                    show: false,
                    message: '',
                    type: 'success'
                },

                mappedBoxes303: MAPPED_BOXES_303,
                mapping390Horizontal: MAPPING_390_HORIZONTAL,

                init() {
                    Object.keys(this.records).forEach(key => {
                        const year = key.split('_')[1];
                        this.registerYearIfNeeded(year);
                    });

                    const keys = Object.keys(this.companies);
                    if (keys.length > 0) {
                        this.selectedCompany = keys[0];
                        this.selectedYear = new Date().getFullYear().toString();
                        this.registerYearIfNeeded(this.selectedYear);
                    }
                },

                showToast(message, type = 'success') {
                    this.toast.message = message;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 4000);
                },

                registerYearIfNeeded(year) {
                    if (year && !this.availableYears.includes(year)) {
                        this.availableYears.push(year);
                        this.availableYears.sort((a, b) => b - a);
                    }
                },

                saveAllToStorage() {
                    localStorage.setItem('iva_companies', JSON.stringify(this.companies));
                    localStorage.setItem('iva_records', JSON.stringify(this.records));
                    localStorage.setItem('iva_overrides', JSON.stringify(this.overrides));
                },

                addNewCompanyPrompt() {
                    const name = prompt("Escribe el nombre o razón social de la empresa:");
                    if (!name) return;
                    const nif = prompt("Escribe el NIF de la empresa:").trim().toUpperCase();
                    if (!nif) return;

                    if (this.companies[nif]) {
                        this.showToast("Esta empresa ya existe", "error");
                        return;
                    }

                    const newComp = { nif, name };
                    this.companies[nif] = newComp;
                    this.saveAllToStorage();
                    
                    this.selectedCompany = nif;
                    this.selectedYear = new Date().getFullYear().toString();
                    this.registerYearIfNeeded(this.selectedYear);
                    this.showToast("Empresa creada correctamente");
                },

                async handlePdfUpload(event) {
                    const files = event.target.files;
                    if (!files.length) return;

                    this.loading = true;
                    let correctCount = 0;

                    for (let i = 0; i < files.length; i++) {
                        try {
                            const file = files[i];
                            this.loadingStatus = `Analizando ${file.name}...`;
                            const arrayBuffer = await file.arrayBuffer();
                            
                            const typedArray = new Uint8Array(arrayBuffer);
                            const pdf = await pdfjsLib.getDocument(typedArray).promise;
                            
                            let parsedResult = await this.parseViaAcroForms(pdf);
                            let methodUsed = "Campos Oficiales (Precisión Máxima)";

                            if (!parsedResult) {
                                methodUsed = "Tokenización Espacial Estricta (Filtro Anti-Errores)";
                                let fullReconstructedLines = [];
                                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                                    const page = await pdf.getPage(pageNum);
                                    const pageLines = await this.extractTextLinesByCoordinates(page);
                                    fullReconstructedLines = fullReconstructedLines.concat(pageLines);
                                }
                                const textReconstruction = fullReconstructedLines.join("\n");
                                this.rawTextPreview = textReconstruction;
                                parsedResult = this.parseReconstructedLines(fullReconstructedLines, MAPPED_BOXES_303);
                            }

                            if (parsedResult) {
                                this.saveParsedResult(parsedResult);
                                correctCount++;
                                this.showToast(`Importado trimestre ${parsedResult.period} vía: ${methodUsed}`);
                            } else {
                                this.showToast(`Estructura no compatible o datos incompletos: ${file.name}`, "error");
                            }

                        } catch (err) {
                            console.error(err);
                            this.showToast(`Error técnico: ${err.message || 'Fallo de lectura del archivo'}`, "error");
                        }
                    }

                    this.loading = false;
                    this.loadingStatus = '';
                },

                async parseViaAcroForms(pdf) {
                    try {
                        if (typeof pdf.getFieldObjects !== 'function') {
                            return null;
                        }
                        const fields = await pdf.getFieldObjects();
                        if (!fields || Object.keys(fields).length === 0) {
                            return null;
                        }

                        let values = {};
                        let matchCount = 0;
                        let rawNif = '';
                        let rawName = '';
                        let rawYear = '';
                        let rawPeriod = '';

                        for (const name in fields) {
                            const fieldObj = fields[name];
                            if (!fieldObj) continue;
                            const val = fieldObj.value;
                            if (val === undefined || val === null || val === '') continue;

                            const cleanFieldName = name.toUpperCase();

                            if (cleanFieldName.includes("NIF") || cleanFieldName.includes("DOC_IDENT")) {
                                rawNif = val.toString().trim().toUpperCase();
                            }
                            if (cleanFieldName.includes("RAZON") || cleanFieldName.includes("NOMBRE") || cleanFieldName.includes("SUJETO")) {
                                if (val.toString().trim().length > 4) rawName = val.toString().trim();
                            }
                            if (cleanFieldName.includes("EJERCICIO") || cleanFieldName.includes("ANIO") || cleanFieldName.includes("AÑO")) {
                                if (val.toString().trim().match(/^20\d{2}$/)) rawYear = val.toString().trim();
                            }
                            if (cleanFieldName.includes("PERIODO") || cleanFieldName.includes("TRIMESTRE")) {
                                rawPeriod = val.toString().trim().toUpperCase();
                            }

                            const boxMatch = name.match(/C0*([0-9]+)/i);
                            if (boxMatch) {
                                const boxNum = boxMatch[1].padStart(2, '0');
                                const matchedTarget = MAPPED_BOXES_303.find(b => b.box303 === boxNum);
                                if (matchedTarget) {
                                    let cleanedVal = typeof val === 'string' ? val.replace(/\./g, '').replace(',', '.') : val;
                                    values[matchedTarget.box303] = parseFloat(cleanedVal) || 0;
                                    matchCount++;
                                }
                            }
                        }

                        if (matchCount > 0) {
                            if (!rawNif || !rawYear || !rawName || rawName === 'Empresa Importada') {
                                let fallbackLines = [];
                                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                                    const page = await pdf.getPage(pageNum);
                                    const pageLines = await this.extractTextLinesByCoordinates(page);
                                    fallbackLines = fallbackLines.concat(pageLines);
                                }
                                const fallbackText = fallbackLines.join(" ");
                                
                                if (!rawNif) {
                                    const nifMatch = fallbackText.match(/\b([A-HJ-NP-S-W]\d{7}[A-Z\d]|\d{8}[A-Z])\b/i);
                                    rawNif = nifMatch ? nifMatch[1].toUpperCase() : 'NIF_DESCONOCIDO';
                                }
                                if (!rawYear) {
                                    const yearMatch = fallbackText.match(/\b(202\d)\b/);
                                    rawYear = yearMatch ? yearMatch[1] : new Date().getFullYear().toString();
                                }
                                
                                if (rawNif && (!rawName || rawName === 'Empresa Importada')) {
                                    let nifLineIdx = fallbackLines.findIndex(l => l.toUpperCase().includes(rawNif));
                                    if (nifLineIdx !== -1) {
                                        for (let offset = -2; offset <= 3; offset++) {
                                            const l = fallbackLines[nifLineIdx + offset];
                                            if (l) {
                                                const cleanLine = l.replace(/Sujeto pasivo|Declarante|Apellidos y nombre o razón social|N\.I\.F\.|NIF|[:]/gi, '').trim();
                                                if (cleanLine.length > 5 && !cleanLine.includes("Página") && !cleanLine.includes("Modelo") && !cleanLine.includes("303") && !cleanLine.includes(rawNif)) {
                                                    rawName = cleanLine;
                                                    break;
                                                }
                                            }
                                        }
                                    }
                                }
                            }

                            let normalizedPeriod = '1T';
                            let rawPStr = rawPeriod.toString().replace(/[\s-]/g, '');
                            if (['01','02','03','1','1T'].includes(rawPStr)) normalizedPeriod = '1T';
                            else if (['04','05','06','2','2T'].includes(rawPStr)) normalizedPeriod = '2T';
                            else if (['07','08','09','3','3T'].includes(rawPStr)) normalizedPeriod = '3T';
                            else if (['10','11','12','4','4T'].includes(rawPStr)) normalizedPeriod = '4T';

                            return {
                                nif: rawNif || 'NIF_DESCONOCIDO',
                                name: rawName || 'Empresa Importada',
                                year: rawYear || new Date().getFullYear().toString(),
                                period: normalizedPeriod,
                                values: values
                            };
                        }
                    } catch (e) {
                        console.warn("Fallo lectura interactiva.", e);
                    }
                    return null;
                },

                async extractTextLinesByCoordinates(page) {
                    const textContent = await page.getTextContent();
                    const items = textContent.items.filter(item => item && item.transform);
                    if (!items || items.length === 0) return [];

                    const thresholdY = 5;

                    items.sort((a, b) => {
                        const yA = a.transform[5];
                        const yB = b.transform[5];
                        if (Math.abs(yB - yA) > thresholdY) {
                            return yB - yA;
                        }
                        return a.transform[4] - b.transform[4];
                    });

                    const lines = [];
                    let currentLineItems = [];
                    let lastY = items[0].transform[5];

                    items.forEach(item => {
                        const currentY = item.transform[5];
                        if (Math.abs(currentY - lastY) > thresholdY) {
                            lines.push(currentLineItems.join(" "));
                            currentLineItems = [];
                            lastY = currentY;
                        }
                        currentLineItems.push(item.str);
                    });

                    if (currentLineItems.length > 0) {
                        lines.push(currentLineItems.join(" "));
                    }

                    return lines;
                },

                parseReconstructedLines(lines, targetBoxes) {
                    const fullTextUnified = lines.join(" ");
                    
                    if (!fullTextUnified.includes("303") && !fullTextUnified.includes("Liquidación")) {
                        return null;
                    }

                    let nif = '';
                    const nifMatch = fullTextUnified.match(/\b([A-HJ-NP-S-W]\d{7}[A-Z\d]|\d{8}[A-Z])\b/i);
                    if (nifMatch) nif = nifMatch[1].toUpperCase();

                    let name = 'Empresa Importada';
                    
                    for (let line of lines) {
                        const cleanL = line.replace(/Sujeto pasivo|Declarante|Apellidos y nombre o razón social|[:]/gi, '').trim();
                        if (line.includes("Razón social") || line.includes("Apellidos y nombre") || line.includes("Sujeto pasivo")) {
                            if (cleanL.length > 5 && !cleanL.includes("Modelo") && !cleanL.includes("Página")) {
                                name = cleanL;
                                break;
                            }
                        }
                    }

                    if (nif && name === 'Empresa Importada') {
                        let nifLineIdx = lines.findIndex(l => l.toUpperCase().includes(nif));
                        if (nifLineIdx !== -1) {
                            for (let offset = -2; offset <= 3; offset++) {
                                const l = lines[nifLineIdx + offset];
                                if (l) {
                                    const cleanLine = l.replace(/N\.I\.F\.|NIF|[:]/gi, '').trim();
                                    if (cleanLine.length > 5 && !cleanLine.includes("Página") && !cleanLine.includes("Modelo") && !cleanLine.includes(nif)) {
                                        name = cleanLine;
                                        break;
                                    }
                                }
                            }
                        }
                    }

                    let year = new Date().getFullYear().toString();
                    for (let line of lines) {
                        const yearMatch = line.match(/\b(?:Ejercicio|Año|Anio)\s*[:]?\s*(20\d{2})\b/i);
                        if (yearMatch) {
                            year = yearMatch[1];
                            break;
                        }
                    }

                    // CORRECCIÓN PERIODO: Evita falsas detecciones en textos legales explicativos
                    let period = '1T';
                    for (let line of lines) {
                        const periodMatch = line.match(/\b(?:Periodo|Período)\s*[:]?\s*([1-4]\s*[-–/sT]*|[0-1][0-9])\b/i);
                        if (periodMatch) {
                            let rawPeriod = periodMatch[1].toUpperCase().replace(/[\s-–/]/g, '');
                            if (['01','02','03','1','1T','1S'].includes(rawPeriod)) { period = '1T'; break; }
                            else if (['04','05','06','2','2T','2S'].includes(rawPeriod)) { period = '2T'; break; }
                            else if (['07','08','09','3','3T','3S'].includes(rawPeriod)) { period = '3T'; break; }
                            else if (['10','11','12','4','4T','4S'].includes(rawPeriod)) { period = '4T'; break; }
                        }
                    }

                    const targetBoxesClean = targetBoxes.map(t => t.box303.replace(/^0+/, '')).concat(['2', '5', '8']);

                    const getLineValidation = (line, boxNum) => {
                        const lower = line.toLowerCase();
                        if (lower.match(/\d{2}[/-]\d{2}[/-]\d{4}/) && !lower.includes("devengado") && !lower.includes("deducible")) {
                            return false; 
                        }
                        switch (boxNum) {
                            case '01': case '03': return lower.includes("4%") || lower.includes("4,00") || lower.includes("devengado");
                            case '04': case '06': return lower.includes("10%") || lower.includes("10,00") || lower.includes("devengado");
                            case '07': case '09': return lower.includes("21%") || lower.includes("21,00") || lower.includes("devengado");
                            case '10': case '11': return lower.includes("intracomunitarias") && (lower.includes("adquisiciones") || lower.includes("adq"));
                            case '12': case '13': return lower.includes("inversión") && lower.includes("sujeto pasivo");
                            case '14': case '15': return lower.includes("modificación") && (lower.includes("bases") || lower.includes("cuotas"));
                            case '27': return lower.includes("total") && lower.includes("devengado");
                            case '28': case '29': return lower.includes("corrientes") && lower.includes("interiores");
                            case '30': case '31': return lower.includes("bienes") && lower.includes("inversión") && lower.includes("interiores");
                            case '36': case '37': return lower.includes("intracomunitarias") && lower.includes("corrientes");
                            case '40': case '41': return lower.includes("rectificación") && lower.includes("deducciones");
                            case '45': return lower.includes("total") && lower.includes("deducible");
                            case '59': return lower.includes("entregas intracomunitarias") || lower.includes("59");
                            case '60': return lower.includes("exportaciones") || lower.includes("60");
                            case '120': return lower.includes("regímenes especiales") || lower.includes("120");
                            case '122': return lower.includes("sujetas") && lower.includes("inversión");
                            case '124': return lower.includes("localización") && lower.includes("deducción");
                            case '110': return lower.includes("compensar") || lower.includes("periodos anteriores");
                            case '46': return lower.includes("resultado") && (lower.includes("liquidación") || lower.includes("liquida"));
                            default: return true;
                        }
                    };

                    const values = {};
                    targetBoxes.forEach(target => {
                        let finalVal = 0;
                        const boxNum = target.box303;
                        const rBox = boxNum.replace(/^0+/, ''); 

                        // CORRECCIÓN EXCLUSIÓN DECIMALES: Se evita buscar números que sirvan de cifras decimales dentro de importes.
                        // Ej. previene que el '11' de '11.169,28' sea confundido con la casilla [11] de cuotas.
                        const boxRegex = new RegExp('(?<![\\d.,])0?' + rBox + '(?![\\d.,])');

                        for (let line of lines) {
                            if (!getLineValidation(line, boxNum)) {
                                continue;
                            }

                            const match = line.match(boxRegex);
                            
                            if (match) {
                                const matchIndex = match.index;
                                const matchLength = match[0].length;

                                const remainingText = line.substring(matchIndex + matchLength).trim();
                                
                                // NORMALIZADOR DE ESPACIOS DE MILLAR
                                const normalizedText = remainingText.replace(/(\d)\s+(\d{3},)/g, '$1$2');
                                const remainingTokens = normalizedText.split(/\s+/);
                                
                                if (remainingTokens.length > 0) {
                                    let firstToken = remainingTokens[0];
                                    let tokenIdx = 0;

                                    if (firstToken.startsWith('.') || firstToken === '...') {
                                        firstToken = remainingTokens[1] || '';
                                        tokenIdx = 1;
                                    }

                                    if (firstToken) {
                                        const cleanToken = firstToken.replace(/[\[\]]/g, '').replace(/^0+/, '').replace(/[^0-9]/g, '');
                                        const isStrictAmount = firstToken.includes(",");

                                        if (!isStrictAmount && targetBoxesClean.includes(cleanToken) && cleanToken !== rBox) {
                                            break; 
                                        }

                                        if (/^-?[\d.]+(?:,\d{2})$/.test(firstToken)) {
                                            let cleanedNum = firstToken.replace(/\./g, '').replace(',', '.');
                                            let numericValue = parseFloat(cleanedNum) || 0;

                                            if (firstToken.match(/^20\d{2}$/)) {
                                                continue; 
                                            }

                                            if (['1', '4', '7'].includes(rBox) && [4, 10, 21].includes(numericValue)) {
                                                const secondToken = remainingTokens[tokenIdx + 1];
                                                if (secondToken && /^-?[\d.]+(?:,\d{2})$/.test(secondToken)) {
                                                    let cleanedSec = secondToken.replace(/\./g, '').replace(',', '.');
                                                    finalVal = parseFloat(cleanedSec) || 0;
                                                }
                                            } else {
                                                finalVal = numericValue;
                                            }
                                        }
                                    }
                                }
                                break; 
                            }
                        }
                        values[boxNum] = finalVal;
                    });

                    return { nif, name, year, period, values };
                },

                saveParsedResult(data) {
                    if (!this.companies[data.nif]) {
                        this.companies[data.nif] = { nif: data.nif, name: data.name };
                    } else if (data.name !== 'Empresa Importada') {
                        this.companies[data.nif].name = data.name;
                    }

                    const recordKey = `${data.nif}_${data.year}_${data.period}`;
                    this.records[recordKey] = data.values;
                    
                    this.recalculateTotals303(data.nif, data.year, data.period);

                    this.registerYearIfNeeded(data.year);
                    
                    this.selectedCompany = data.nif;
                    this.selectedYear = data.year;
                    
                    this.saveAllToStorage();
                },

                getBox303Value(nif, year, period, box) {
                    const key = `${nif}_${year}_${period}`;
                    if (this.records[key] && this.records[key][box] !== undefined) {
                        return parseFloat(this.records[key][box]) || 0;
                    }
                    return 0;
                },

                getBox303ValueFormatted(nif, year, period, box) {
                    const val = this.getBox303Value(nif, year, period, box);
                    return this.formatSpanishNumber(val);
                },

                updateBox303ValueFormatted(nif, year, period, box, valStr) {
                    const num = this.parseSpanishNumber(valStr);
                    this.updateBox303Value(nif, year, period, box, num);
                },

                updateBox303Value(nif, year, period, box, val) {
                    const key = `${nif}_${year}_${period}`;
                    if (!this.records[key]) {
                        this.records[key] = {};
                    }
                    this.records[key][box] = val; 
                    
                    this.recalculateTotals303(nif, year, period);
                    this.saveAllToStorage();
                },

                recalculateTotals303(nif, year, period) {
                    const key = `${nif}_${year}_${period}`;
                    if (!this.records[key]) return;

                    const record = this.records[key];

                    const c03 = parseFloat(record['03']) || 0;
                    const c06 = parseFloat(record['06']) || 0;
                    const c09 = parseFloat(record['09']) || 0;
                    const c11 = parseFloat(record['11']) || 0;
                    const c13 = parseFloat(record['13']) || 0;
                    const c15 = parseFloat(record['15']) || 0;
                    
                    const totalDevengado = Math.round((c03 + c06 + c09 + c11 + c13 + c15) * 100) / 100;
                    record['27'] = totalDevengado;

                    const c29 = parseFloat(record['29']) || 0;
                    const c31 = parseFloat(record['31']) || 0;
                    const c37 = parseFloat(record['37']) || 0;
                    const c41 = parseFloat(record['41']) || 0;

                    const totalDeducible = Math.round((c29 + c31 + c37 + c41) * 100) / 100;
                    record['45'] = totalDeducible;

                    const c110 = parseFloat(record['110']) || 0;
                    const resultadoFinal = Math.round((totalDevengado - totalDeducible - c110) * 100) / 100;
                    record['46'] = resultadoFinal;

                    this.records[key] = record;
                },

                calculateSum390(nif, year, item) {
                    if (!item) return 0;
                    let total = 0;
                    const periods = ['1T', '2T', '3T', '4T'];
                    
                    periods.forEach(period => {
                        const key = `${nif}_${year}_${period}`;
                        if (this.records[key]) {
                            item.sources.forEach(box303 => {
                                if (this.records[key][box303]) {
                                    total += parseFloat(this.records[key][box303]) || 0;
                                }
                            });
                        }
                    });

                    return Math.round(total * 100) / 100;
                },

                getOverrideValue(nif, year, box390) {
                    const key = `${nif}_${year}_${box390}`;
                    return this.overrides[key] !== undefined ? this.overrides[key] : '';
                },

                getOverrideValueFormatted(nif, year, box390) {
                    const val = this.getOverrideValue(nif, year, box390);
                    return val !== '' ? this.formatSpanishNumber(val) : '';
                },

                updateOverrideValueFormatted(nif, year, box390, textValue) {
                    const num = this.parseSpanishNumber(textValue);
                    this.updateOverrideValue(nif, year, box390, textValue === '' ? '' : num);
                },

                hasOverride(nif, year, box390) {
                    const key = `${nif}_${year}_${box390}`;
                    return this.overrides[key] !== undefined && this.overrides[key] !== '';
                },

                updateOverrideValue(nif, year, box390, val) {
                    const key = `${nif}_${year}_${box390}`;
                    if (val === '') {
                        delete this.overrides[key];
                    } else {
                        this.overrides[key] = val;
                    }
                    this.saveAllToStorage();
                },

                getFinal390Value(nif, year, item) {
                    if (!item) return 0;
                    if (this.hasOverride(nif, year, item.box390)) {
                        return this.overrides[`${nif}_${year}_${item.box390}`];
                    }
                    return this.calculateSum390(nif, year, item);
                },

                formatSpanishNumber(value) {
                    if (value === undefined || value === null || isNaN(value) || value === '') return '0,00';
                    return new Intl.NumberFormat('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
                },

                parseSpanishNumber(string) {
                    if (!string) return 0;
                    if (typeof string === 'number') return string;
                    let cleaned = string.replace(/\./g, '').replace(',', '.');
                    return parseFloat(cleaned) || 0;
                },

                formatCurrency(value) {
                    return this.formatSpanishNumber(value) + " €";
                },

                deleteActiveYearData() {
                    if (confirm(`¿Seguro que deseas vaciar todos los registros del año fiscal ${this.selectedYear}?`)) {
                        const periods = ['1T', '2T', '3T', '4T'];
                        periods.forEach(p => {
                            const key = `${this.selectedCompany}_${this.selectedYear}_${p}`;
                            delete this.records[key];
                        });

                        this.mapping390Horizontal.forEach(row => {
                            if (row.baseItem) {
                                const key = `${this.selectedCompany}_${this.selectedYear}_${row.baseItem.box390}`;
                                delete this.overrides[key];
                            }
                            if (row.cuotaItem) {
                                const key = `${this.selectedCompany}_${this.selectedYear}_${row.cuotaItem.box390}`;
                                delete this.overrides[key];
                            }
                        });

                        this.saveAllToStorage();
                        this.showToast("Datos borrados localmente.");
                    }
                },

                exportData() {
                    const dataPayload = {
                        companies: this.companies,
                        records: this.records,
                        overrides: this.overrides
                    };

                    const blob = new Blob([JSON.stringify(dataPayload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Backup_IVA_${this.selectedCompany || 'General'}_${new Date().toISOString().slice(0,10)}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    this.showToast("Copia de seguridad descargada correctamente.");
                },

                importData(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const parsed = JSON.parse(e.target.result);
                            
                            if (parsed.companies && parsed.records && parsed.overrides) {
                                // CORRECCIÓN REACTIVIDAD: Reasignar referencias completas para obligar a Alpine.js a redibujar toda la base de datos
                                this.companies = { ...parsed.companies };
                                this.records = { ...parsed.records };
                                this.overrides = { ...parsed.overrides };

                                Object.keys(this.records).forEach(k => {
                                    const yearFromKey = k.split('_')[1];
                                    this.registerYearIfNeeded(yearFromKey);
                                    const parts = k.split('_');
                                    this.recalculateTotals303(parts[0], parts[1], parts[2]);
                                });

                                this.saveAllToStorage();
                                this.showToast("Base de datos de copia de seguridad restaurada.");
                                if (Object.keys(this.companies).length > 0) {
                                    this.selectedCompany = Object.keys(this.companies)[0];
                                    this.selectedYear = new Date().getFullYear().toString();
                                }
                            } else {
                                this.showToast("El archivo JSON no contiene la estructura esperada.", "error");
                            }
                        } catch (err) {
                            this.showToast("No se pudo leer el archivo de copia de seguridad.", "error");
                        }
                    };
                    reader.readAsText(file);
                }
            };
        }
    </script>
</body>
</html>
